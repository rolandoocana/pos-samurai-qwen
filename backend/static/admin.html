<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Admin Precios</title>
<style>body{font-family:system-ui;padding:20px;background:#f5f5f5}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:10px;border:1px solid #eee}input{width:80px}button{padding:10px 20px;background:#007bff;color:#fff;border:none;border-radius:4px;cursor:pointer}</style></head>
<body><h2>⚙️ Gestión de Precios</h2><table><thead><tr><th>Producto</th><th>Actual</th><th>Nuevo</th></tr></thead><tbody id="tbody"></tbody></table><button onclick="save()">💾 Guardar</button><script>
let changes={}; async function load(){ if(document.getElementById('tbody')){ const res=await fetch('/api/products'); const p=await res.json(); document.getElementById('tbody').innerHTML=p.map(x=>`<tr><td>${x.name}</td><td>$${x.price.toFixed(2)}</td><td><input type="number" step="0.01" value="${x.price}" onchange="chg('${x.id}',this.value)"></td></tr>`).join(''); }} function chg(id,v){changes[id]=parseFloat(v);} async function save(){await fetch('/api/products/bulk-prices',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(changes)}); alert('✅ Actualizado'); changes={}; load();} load();
</script></body></html>
