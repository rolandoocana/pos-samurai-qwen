<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Configuración LAN POS</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>body{font-family:system-ui;text-align:center;padding:40px;background:#f0f2f5}#qr{margin:20px auto;display:flex;justify-content:center;background:#fff;padding:10px;border-radius:8px;width:fit-content}.url-box{font-family:monospace;background:#fff;padding:12px;border-radius:8px;display:inline-block;margin:10px 0;border:1px solid #ccc}</style></head>
<body><h2>📱 Escanea para conectar tu celular</h2><div id="qr"></div><div class="url-box" id="url-text"></div><script>const ip=window.location.hostname;const port=window.location.port||'8000';const url=`http://${ip}:${port}`;document.getElementById('url-text').textContent=url;new QRCode(document.getElementById('qr'),{text:url,width:256,height:256,correctLevel:QRCode.CorrectLevel.M});</script></body></html>
