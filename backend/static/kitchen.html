<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocina SAMURAI</title>
    <style>
        body { background: #111; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; margin: 0; }
        h1 { margin: 0 0 20px 0; display: flex; align-items: center; gap: 10px; font-size: 1.8rem; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .card { background: #222; padding: 20px; border-radius: 12px; border: 2px solid #444; animation: popIn 0.3s ease; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .card-header { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding-bottom: 10px; margin-bottom: 10px; }
        .table-badge { background: #e74c3c; color: white; padding: 6px 12px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; }
        .time { color: #888; font-size: 0.9rem; align-self: center; }
        .item { background: #333; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #f39c12; }
        .item-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .qty-badge { background: #f39c12; color: #000; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; margin-right: 8px; }
        .notes { color: #ffeb3b; font-size: 0.9rem; font-style: italic; margin-top: 5px; }
        .notes::before { content: "⚠️ "; }
        .btn-ready { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-ready:hover { background: #2ecc71; }
        .card.done { opacity: 0.4; border-color: #27ae60; }
        .card.done .btn-ready { background: #555; cursor: default; }
    </style>
</head>
<body>
    <h1>🔥 Cocina SAMURAI</h1>
    <div id="grid"></div>

<script>
    const ws = new WebSocket(`ws://${location.host}/ws/kitchen`);
    const grid = document.getElementById('grid');
    const ordersMap = new Map();

    ws.onmessage = async (e) => {
        const data = JSON.parse(e.data);
        if (data.type === 'new_order') {
            await loadOrder(data.order_id);
        } else if (data.type === 'item_status') {
            markItemDone(data.item_id);
        }
    };

    async function loadOrder(orderId) {
        try {
            const res = await fetch(`/api/orders/${orderId}`);
            if (!res.ok) return console.error('❌ Error cargando pedido');
            const order = await res.json();
            renderOrder(order);
        } catch (err) { console.error('Error:', err); }
    }

    function renderOrder(order) {
        if (ordersMap.has(order.id)) return;

        const card = document.createElement('div');
        card.className = 'card';
        card.id = `card-${order.id}`;
        ordersMap.set(order.id, card);

        const time = new Date(order.created_at).toLocaleTimeString('es-EC', {hour: '2-digit', minute:'2-digit'});
        const tableLabel = order.takeout ? '🛵 LLEVAR' : `🍽️ MESA ${order.table || '?'}`;

        let itemsHtml = order.items.map(item => `
            <div class="item" data-item-id="${item.id}">
                <div class="item-title"><span class="qty-badge">${item.quantity}x</span> ${item.product_name}</div>
                ${item.notes.length > 0 ? `<div class="notes">${item.notes.join(' | ')}</div>` : ''}
            </div>
        `).join('');

        card.innerHTML = `
            <div class="card-header">
                <span class="table-badge">${tableLabel}</span>
                <span class="time">${time}</span>
            </div>
            <div class="items-list">${itemsHtml}</div>
            <button class="btn-ready" onclick="markReady('${order.id}')">✅ LISTO</button>
        `;

        grid.appendChild(card);
        // Opcional: Sonido al llegar pedido
        // new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg').play();
    }

    function markReady(orderId) {
        const card = document.getElementById(`card-${orderId}`);
        if (!card || card.classList.contains('done')) return;
        card.classList.add('done');
        card.querySelector('.btn-ready').textContent = '✓ ENVIADO A MESA';
    }

    function markItemDone(itemId) {
        const el = document.querySelector(`[data-item-id="${itemId}"]`);
        if (el) el.style.opacity = '0.3';
    }
</script>
</body>
</html>
